<!doctype html>
<html lang="%paraglide.lang%" data-theme="concord">
	<head>
		<meta charset="utf-8" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			window.__loadGtag = function () {
				if (window.__gtagLoaded) return;
				window.__gtagLoaded = true;
				var script = document.createElement('script');
				script.async = true;
				script.src = 'https://www.googletagmanager.com/gtag/js?id=G-HD0Y375DTY';
				script.onload = function () {
					gtag('js', new Date());
					gtag('config', 'G-HD0Y375DTY');
				};
				document.head.appendChild(script);
			};
			if ('requestIdleCallback' in window) {
				requestIdleCallback(window.__loadGtag, { timeout: 3000 });
			} else {
				setTimeout(window.__loadGtag, 2000);
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
